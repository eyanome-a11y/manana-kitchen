<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mañana Kitchen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f6f6f4;--bg3:#efefec;--text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;--border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);--green:#1D9E75;--blue:#185FA5;--red:#E24B4A;--amber:#BA7517;--r:10px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
#app{max-width:940px;margin:0 auto;padding:1.2rem 1rem 3rem}
h1{font-size:22px;font-weight:600;margin-bottom:1px}
#ml{font-size:12px;color:var(--text2);margin-bottom:1.2rem}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);overflow-x:auto;margin-bottom:1.3rem}
.tab{padding:6px 12px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;font-family:inherit}
.tab.active{color:var(--text);border-bottom:2px solid var(--text);font-weight:500}
.panel{display:none}.panel.active{display:block}
.card{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:.9rem;background:var(--bg)}
.ch{padding:7px 13px;background:var(--bg2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.dr{border-top:1px solid var(--border);background:var(--bg)}.dr:first-child{border-top:none}
.dh{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;flex-wrap:wrap}
.dn{flex:1;font-size:14px;font-weight:500;min-width:100px}.dn.off{color:var(--text3)}
.sb{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap}
.tg{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);margin:1px 2px 1px 0}
.dd{display:none;padding:0 13px 13px;border-top:1px solid var(--border)}.dd.open{display:block}
.nt{font-size:12px;color:var(--text2);font-style:italic;margin:9px 0 7px;line-height:1.6}
table.it{width:100%;font-size:12px;border-collapse:collapse}
table.it th{color:var(--text3);font-weight:600;padding:3px 5px 3px 0;text-align:left;font-size:11px}
table.it td{padding:4px 5px 4px 0;border-top:1px solid var(--border)}
table.it td.m{color:var(--text3);font-size:11px}
.ra{display:flex;gap:7px;margin-top:9px}
.btn{padding:5px 11px;font-size:12px;border-radius:6px;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit}
.btn:hover{background:var(--bg2)}.btn.d{border-color:var(--red);color:var(--red)}.btn.p{font-weight:600}
.btn.sm{padding:3px 9px;font-size:11px}.btn.act{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn.grn{background:var(--green);color:#fff;border-color:var(--green)}
.tog{width:32px;height:18px;border-radius:9px;border:1px solid #ccc;position:relative;cursor:pointer;flex-shrink:0;transition:background .15s}
.tog.on{background:var(--green);border-color:var(--green)}.tog.off{background:var(--bg3)}
.tdot{position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:white;transition:left .15s}
.ef{padding:13px;background:var(--bg2);border-top:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:2px;margin-bottom:7px}
.fg label{font-size:11px;color:var(--text2);font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit}
.fg textarea{resize:vertical}
table.ie{width:100%;font-size:11px;border-collapse:collapse;margin-bottom:7px}
table.ie th{font-size:10px;color:var(--text3);font-weight:600;padding:2px 3px;text-align:left}
table.ie td{padding:2px 2px;border-top:1px solid var(--border)}
table.ie input,table.ie select{width:100%;font-size:11px;padding:3px 4px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-family:inherit}
.xb{background:transparent;border:none;cursor:pointer;color:var(--red);font-size:16px;padding:0 3px;line-height:1}
.evg{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));gap:7px}
.evf label{font-size:11px;color:var(--text2);display:block;margin-bottom:2px;font-weight:500}
.evf input{width:100%;font-size:13px;padding:5px 7px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-weight:600;font-family:inherit}
.pr{display:flex;justify-content:space-between;padding:6px 13px;border-top:1px solid var(--border);font-size:13px}
.wi{width:50px;font-size:12px;padding:3px 4px;border:1px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--text);text-align:center;font-family:inherit}
.abtn{width:100%;padding:10px;border:1px dashed var(--border2);border-radius:var(--r);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;margin-top:3px;font-family:inherit}
.abtn:hover{background:var(--bg2)}
.ib{padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text2);margin-bottom:.9rem;line-height:1.6}
.sl-cat{margin-bottom:1.1rem}
.sl-cat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:4px;display:block}
.sl-rows{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--bg)}
.sl-row{display:flex;align-items:center;gap:10px;padding:8px 13px;border-top:1px solid var(--border);font-size:13px;position:relative}
.sl-row:first-child{border-top:none}.sl-row:nth-child(even){background:var(--bg2)}
.sl-row:hover .sl-tt{display:block}
.sl-name{flex:1}.sl-qty{font-size:14px;font-weight:700;min-width:65px;text-align:right}
.sl-sup{display:flex;flex-wrap:wrap;gap:2px;min-width:70px;justify-content:flex-end}
.sl-tt{display:none;position:absolute;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--text2);z-index:10;max-width:220px;top:100%;right:13px;line-height:1.5;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.tb{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.9rem;flex-wrap:wrap;gap:7px}
.stock-row{display:flex;align-items:center;gap:10px;padding:9px 13px;border-top:1px solid var(--border);font-size:13px;flex-wrap:wrap}
.stock-row:first-child{border-top:none}
.stock-name{flex:1;font-weight:500}
.stock-exp{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600}
.exp-ok{background:#EAF3DE;color:#3B6D11}
.exp-warn{background:#FFF3CD;color:#854F0B}
.exp-critical{background:#F8D7DA;color:#A32D2D}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:7px 13px;border-top:1px solid var(--border);font-size:13px}
.task-row:first-child{border-top:none}
.task-row input[type=checkbox]{margin-top:3px;flex-shrink:0;cursor:pointer;accent-color:var(--green);width:14px;height:14px}
.task-row label{flex:1;line-height:1.5;cursor:pointer}
.task-row label.done{text-decoration:line-through;color:var(--text3)}
.task-row .del-t{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px}
.task-row .del-t:hover{color:var(--red)}
.add-task-row{display:flex;gap:6px;padding:8px 13px;border-top:1px solid var(--border)}
.add-task-row input{flex:1;font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit}
.temp-form{display:grid;grid-template-columns:1fr 1fr 2fr auto;gap:8px;padding:10px 13px;border-top:1px solid var(--border);align-items:end}
.temp-form input{font-size:13px;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;width:100%}
.temp-form label{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:2px}
.temp-row{display:flex;gap:12px;padding:7px 13px;border-top:1px solid var(--border);font-size:12px;align-items:center;flex-wrap:wrap}
.temp-row:first-child{border-top:none}
.temp-val{font-weight:700;font-size:14px}
.temp-ok{color:var(--green)}.temp-warn{color:var(--amber)}.temp-bad{color:var(--red)}
.allg-table{width:100%;border-collapse:collapse;font-size:12px}
.allg-table th{padding:6px 8px;text-align:left;background:var(--bg2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);border:1px solid var(--border)}
.allg-table td{padding:5px 8px;border:1px solid var(--border);vertical-align:top}
.allg-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--red);margin:0 auto}
.allg-none{color:var(--text3)}
/* Expenses */
.exp-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:13px}
.exp-row{display:flex;align-items:center;gap:8px;padding:8px 13px;border-top:1px solid var(--border);font-size:13px;flex-wrap:wrap}
.exp-row:first-child{border-top:none}
.exp-row:nth-child(even){background:var(--bg2)}
.exp-product{flex:1;font-weight:500;min-width:120px}
.exp-supplier{font-size:11px;color:var(--text2);min-width:80px}
.exp-cat{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);white-space:nowrap}
.exp-price{font-weight:700;font-size:14px;min-width:55px;text-align:right}
.exp-date{font-size:11px;color:var(--text3);min-width:65px;text-align:right}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:.9rem}
.summary-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.summary-label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.summary-value{font-size:20px;font-weight:700;color:var(--text)}
.summary-sub{font-size:11px;color:var(--text3);margin-top:2px}
.filter-bar{display:flex;gap:8px;margin-bottom:.9rem;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div style="margin-bottom:1.2rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
    <div><h1>Mañana</h1><p id="ml">Kitchen · Walton-on-Thames</p></div>
    <div id="week-badge" style="font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;color:var(--text2);background:var(--bg)"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="ST('dishes')">Dishes</button>
    <button class="tab" onclick="ST('stock')">Stock</button>
    <button class="tab" onclick="ST('tasks')">Tasks</button>
    <button class="tab" onclick="ST('expenses')">Expenses</button>
    <button class="tab" onclick="ST('shopping')">Shopping</button>
    <button class="tab" onclick="ST('temps')">Temp log</button>
    <button class="tab" onclick="ST('allergens')">Allergens</button>
    <button class="tab" onclick="ST('events')">Events</button>
  </div>
  <div id="pd-dishes" class="panel active"></div>
  <div id="pd-stock" class="panel"></div>
  <div id="pd-tasks" class="panel"></div>
  <div id="pd-expenses" class="panel"></div>
  <div id="pd-shopping" class="panel"></div>
  <div id="pd-temps" class="panel"></div>
  <div id="pd-allergens" class="panel"></div>
  <div id="pd-events" class="panel"></div>
</div>
<script>
const uid=()=>Math.random().toString(36).slice(2,9);
const ig=(n,q,u,c,s)=>({id:uid(),name:n,qty:parseFloat(q)||0,unit:u,cat:c||"Other",sup:s||""});
const pSup=s=>s?s.split(/[\/,]/).map(x=>x.trim()).filter(Boolean):[];
const SBG={"Para Picar":"#FAEEDA","Tapas":"#FAECE7","Mains":"#E6F1FB","Dessert":"#EAF3DE","Sauces":"#E1F5EE"};
const STX={"Para Picar":"#633806","Tapas":"#993C1D","Mains":"#0C447C","Dessert":"#3B6D11","Sauces":"#0F6E56"};
const SECS=["Para Picar","Tapas","Mains","Dessert","Sauces"];
const CATS=["Bakery","Charcuterie","Dairy","Dry goods","Produce","Protein","Other"];
const EXP_CATS=["Produce","Protein","Dairy","Dry goods","Packaging","Cleaning","Equipment","Other"];
const DAYS=["Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const TASK_DAYS=[{key:"today",label:"Today"},{key:"tuesday",label:"Tuesday"},{key:"wednesday",label:"Wednesday"},{key:"thursday",label:"Thursday"},{key:"friday",label:"Friday"},{key:"saturday",label:"Saturday"},{key:"sunday",label:"Sunday"}];
const ALLERGENS=["Gluten","Crustaceans","Eggs","Fish","Peanuts","Soya","Dairy","Tree nuts","Celery","Mustard","Sesame","Sulphites","Lupin","Molluscs"];
const DISH_ALLERGENS={"Fully loaded Nachos":["Gluten","Dairy"],"Charcuterie & cheese board":["Gluten","Dairy","Sulphites"],"Spicy Corn":["Dairy","Gluten"],"Pan con tomate":["Gluten","Fish"],"Batatas bravas":["Gluten"],"Gambas al ajillo":["Crustaceans","Gluten","Dairy","Sulphites"],"Calamares":["Gluten","Eggs","Molluscs"],"Chorizo al vino":["Gluten","Sulphites"],"Quesadilla asada":["Gluten","Dairy"],"Padrón peppers":["Dairy"],"Salata russa":["Eggs","Dairy","Mustard"],"Pork ribs — carnitas style":["Dairy","Sulphites"],"Enchiladas (chicken or cheese)":["Gluten","Dairy"],"Chicken mole with rice":["Gluten","Dairy","Sesame","Tree nuts"],"Tacos x4 — Asada":["Gluten","Soya"],"Tacos x4 — Birria":["Gluten"],"Tacos x4 — Cochinita Pibil":["Gluten"],"Carlota de limón":["Gluten","Dairy"]};

function getWeekNum(){const n=new Date(),s=new Date(n.getFullYear(),0,1);return Math.ceil(((n-s)/86400000+s.getDay()+1)/7);}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'—';}
function fmtDateFull(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';}
function daysLeft(exp){if(!exp)return 999;return Math.ceil((new Date(exp)-new Date())/(1000*60*60*24));}
function todayISO(){return new Date().toISOString().slice(0,10);}

async function apiGet(url){const r=await fetch(url);return r.json();}
async function apiPost(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
async function apiPatch(url,body){const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
async function apiDel(url){await fetch(url,{method:'DELETE'});}
async function kvGet(k){const r=await apiGet('/api/kv/'+k);return r.value?JSON.parse(r.value):null;}
async function kvSet(k,v){await apiPost('/api/kv/'+k,{value:JSON.stringify(v)});}

const DEFAULT_DISHES=standardize([
  {id:uid(),name:"Fully loaded Nachos",sec:"Para Picar",active:true,price:12.5,url:"",notes:"Cama de nachos de bolsa. Queso cascaval gratinado. Pico de gallo, jalapeños encurtidos, guacamole, crème fraîche, chipotle cream sauce. Extra carne asada +£3.",ings:[ig("Nachos (bag)",80,"g","Dry goods","Local"),ig("Cascaval cheese",60,"g","Dairy","Local"),ig("Black beans (tinned)",40,"g","Dry goods","Tesco"),ig("Jalapeño (pickled)",10,"g","Dry goods","MexGrocer"),ig("Crème fraîche",20,"g","Dairy","Tesco"),ig("Hass avocado",0.5,"pcs","Produce","Local"),ig("Chipotle cream sauce",15,"g","Dry goods","Local"),ig("Fresh tomato",0.036,"kg","Produce","Local"),ig("White onion",0.015,"kg","Produce","Local"),ig("Fresh coriander",2,"g","Produce","Local"),ig("Fresh lime",0.17,"pcs","Produce","Local")]},
  {id:uid(),name:"Charcuterie & cheese board",sec:"Para Picar",active:true,price:24.5,url:"",notes:"PENDING — define with Sylvi before serving.",ings:[ig("Serrano ham",40,"g","Charcuterie","Brindisa"),ig("Cecina",40,"g","Charcuterie","Brindisa"),ig("Chorizo",40,"g","Charcuterie","Brindisa"),ig("Onion chutney",20,"g","Dry goods","Tesco"),ig("Pickles",5,"pcs","Dry goods","Tesco")]},
  {id:uid(),name:"Spicy Corn",sec:"Tapas",active:true,price:7.5,url:"",notes:"1 corn cob, cut lengthways x4. Paprika + EVOO + chilli flakes + cheese → gratinate. Plate with crème fraîche drizzle + chilli oil. Cob frozen & cooked — defrost in fridge.",ings:[ig("Corn cob (frozen, cooked)",1,"pcs","Produce","Local"),ig("Smoked paprika",2,"g","Dry goods","Brindisa"),ig("Extra virgin olive oil",10,"ml","Dry goods","Brindisa"),ig("Chilli flakes",1,"g","Dry goods","Tesco"),ig("Cascaval cheese (grated)",10,"g","Dairy","Local"),ig("Crème fraîche",15,"g","Dairy","Tesco"),ig("Chilli oil",5,"ml","Dry goods","House-made")]},
  {id:uid(),name:"Pan con tomate",sec:"Tapas",active:true,price:7.5,url:"",notes:"4 slices M&S bread toasted with EVOO. Filtered tomato mix (squeezed, no skin, drained, salt, pepper, EVOO — cold line). 1-2 anchovies. Fresh basil + Maldon to finish. Wooden board.",ings:[ig("M&S bread",4,"slice","Bakery","M&S"),ig("Filtered tomato mix",30,"g","Produce","House-made"),ig("Extra virgin olive oil",8,"ml","Dry goods","Brindisa"),ig("Anchovies",4,"pcs","Charcuterie","Brindisa"),ig("Fresh basil",2,"g","Produce","Local"),ig("Maldon sea salt",0.5,"g","Dry goods","Tesco")]},
  {id:uid(),name:"Batatas bravas",sec:"Tapas",active:true,price:7.5,url:"",notes:"Peel, dice, wash. First fry 160°C → cool & store. TO ORDER: fry 190°C, drain, salt + sumac in bowl with chives. Salsero: roasted red pepper sauce + alioli on side — do NOT pour over.",ings:[ig("Potato",200,"g","Produce","Local"),ig("Sumac powder",1,"g","Dry goods","Local"),ig("Chives",3,"g","Produce","Local"),ig("Red pepper sauce",30,"g","Dry goods","House-made"),ig("Alioli",20,"g","Dairy","House-made")]},
  {id:uid(),name:"Gambas al ajillo",sec:"Tapas",active:true,price:12.5,url:"",notes:"MISE EN PLACE: diced garlic, grated ginger, spice mix (kucharek+paprika+chilli), butter portions, tequila measure, prawns at 10 pcs. TO ORDER: butter → garlic → ginger → spice mix → prawns → splash tequila. 3 bread slices.",ings:[ig("Tiger prawns (raw, peeled)",10,"pcs","Protein","Fishmonger"),ig("Butter",15,"g","Dairy","Tesco"),ig("Garlic",5,"g","Produce","Local"),ig("Fresh ginger",2,"g","Produce","Local"),ig("Kucharek seasoning",0.5,"g","Dry goods","Local"),ig("Smoked paprika",0.5,"g","Dry goods","Brindisa"),ig("Chilli flakes",0.5,"g","Dry goods","Tesco"),ig("Tequila",10,"ml","Dry goods","Local"),ig("Sourdough bread",3,"slice","Bakery","Local")]},
  {id:uid(),name:"Calamares",sec:"Tapas",active:true,price:9.0,url:"",notes:"Pre-battered & frozen. Fry 190°C until golden. 10 pieces in bowl on rocket. Sliced cornichons on top. Alioli in salsero.",ings:[ig("Calamares (frozen, pre-battered)",150,"g","Protein","Local"),ig("Rocket salad",20,"g","Produce","Local"),ig("Cornichons (sliced)",15,"g","Dry goods","Tesco"),ig("Alioli",20,"g","Dairy","House-made")]},
  {id:uid(),name:"Chorizo al vino",sec:"Tapas",active:true,price:12.5,url:"",notes:"10 slices ~7mm. Fry both sides. Pomegranate sauce + splash Merlot. Small clay cazuela on rocket. Fresh pomegranate seeds + chives. 3 toasted bread slices.",ings:[ig("Spanish chorizo (cooking)",120,"g","Charcuterie","Brindisa"),ig("Pomegranate sauce",15,"ml","Dry goods","Local"),ig("Merlot red wine",20,"ml","Dry goods","Local"),ig("Rocket salad",20,"g","Produce","Local"),ig("Fresh pomegranate seeds",15,"g","Produce","Local"),ig("Chives",3,"g","Produce","Local"),ig("Sourdough bread",3,"slice","Bakery","Local")]},
  {id:uid(),name:"Quesadilla asada",sec:"Tapas",active:true,price:12.5,url:"",notes:"Large flour tortilla on griddle. Cascaval + carne asada. Fold, cut 3 triangles. Guacamole ball + chipotle cream zigzag + cilantro leaves.",ings:[ig("Flour tortilla (large)",1,"pcs","Dry goods","MexGrocer"),ig("Cascaval cheese",60,"g","Dairy","Local"),ig("Carne asada (batch)",80,"g","Protein","House-made"),ig("Hass avocado",0.5,"pcs","Produce","Local"),ig("Chipotle cream sauce",10,"g","Dry goods","Local"),ig("Fresh coriander",2,"g","Produce","Local")]},

let dishes=[...DEFAULT_DISHES];
let events=[{id:"fri",name:"Friday",covers:35,tapaR:0.4,mainR:0.35,tacoR:0.4,salsaB:1},{id:"sat",name:"Saturday",covers:40,tapaR:0.45,mainR:0.35,tacoR:0.45,salsaB:1},{id:"sun",name:"Sunday",covers:30,tapaR:0.4,mainR:0.3,tacoR:0.4,salsaB:1}];
let tab="dishes",expId=null,editId=null;
let stockItems=[],taskItems={},tempLogs=[],expenses=[];

async function init(){
  try{
    const [d,e,s,tl,ex]=await Promise.all([kvGet("manana-dishes"),kvGet("manana-events"),apiGet('/api/stock'),apiGet('/api/temps'),apiGet('/api/expenses')]);
    if(d)dishes=d;
    if(e)events=e;
    stockItems=Array.isArray(s)?s:[];
    tempLogs=Array.isArray(tl)?tl:[];
    expenses=Array.isArray(ex)?ex:[];
    const tk=await apiGet('/api/tasks');
    taskItems={};
    (Array.isArray(tk)?tk:[]).forEach(t=>{if(!taskItems[t.day_key])taskItems[t.day_key]=[];taskItems[t.day_key].push(t);});
  }catch(e){console.log('fresh start');}
  document.getElementById("week-badge").textContent="Week "+getWeekNum();
  render();
}

async function saveDishes(){await kvSet("manana-dishes",dishes);}
async function saveEvents(){await kvSet("manana-events",events);}

function cP(d){if(!d.active)return 0;return Math.round(events.reduce((s,e)=>{let r=0;if(d.sec==="Sauces")r=e.salsaB||0;else if(d.name.toLowerCase().includes("taco")||d.name.toLowerCase().includes("ribs"))r=(e.tacoR||0)*(e.covers||0);else if(["Para Picar","Tapas"].includes(d.sec))r=(e.tapaR||0)*(e.covers||0);else r=(e.mainR||0)*(e.covers||0);return s+r;},0));}
function cSL(){const a={};dishes.forEach(d=>{const p=cP(d);if(p<=0)return;(d.ings||[]).forEach(i=>{const k=i.name.trim().toLowerCase()+"__"+i.unit.trim().toLowerCase();if(!a[k])a[k]={name:i.name.trim(),unit:i.unit.trim(),cat:i.cat||"Other",sup:i.sup||"",total:0,usedIn:[]};a[k].total+=(parseFloat(i.qty)||0)*p;if(!a[k].usedIn.includes(d.name))a[k].usedIn.push(d.name);});});return Object.values(a).sort((a,b)=>a.cat.localeCompare(b.cat)||a.name.localeCompare(b.name));}
function rQ(t,u){if(t<=0)return"—";const un=u.toLowerCase();if(un==="g"){if(t<100)return Math.ceil(t/10)*10+"g";if(t<500)return Math.ceil(t/50)*50+"g";if(t<2000)return Math.ceil(t/100)*100+"g";return(Math.ceil(t/500)*0.5).toFixed(1)+"kg";}if(un==="ml"){if(t<200)return Math.ceil(t/10)*10+"ml";if(t<1000)return Math.ceil(t/100)*100+"ml";return(Math.ceil(t/500)*0.5).toFixed(1)+"L";}if(un==="pcs")return Math.ceil(t)+" pcs";if(un==="kg")return(Math.ceil(t*10)/10).toFixed(1)+"kg";if(un==="tbsp")return Math.ceil(t)+" tbsp";if(un==="slice")return"~"+Math.ceil(t/8)+" loaves";return t.toFixed(1)+" "+u;}
function tH(s){return pSup(s).map(x=>`<span class="tg">${x}</span>`).join("");}

function ST(t){tab=t;document.querySelectorAll(".tab").forEach(el=>{el.classList.toggle("active",el.textContent.trim().toLowerCase()===t||(t==="dishes"&&el.textContent.trim().toLowerCase()==="dishes")||(t==="stock"&&el.textContent.trim().toLowerCase()==="stock")||(t==="tasks"&&el.textContent.trim().toLowerCase()==="tasks")||(t==="expenses"&&el.textContent.trim().toLowerCase()==="expenses")||(t==="shopping"&&el.textContent.trim().toLowerCase()==="shopping")||(t==="temps"&&el.textContent.trim().toLowerCase()==="temp log")||(t==="allergens"&&el.textContent.trim().toLowerCase()==="allergens")||(t==="events"&&el.textContent.trim().toLowerCase()==="events"));});document.querySelectorAll(".panel").forEach(el=>el.classList.remove("active"));document.getElementById("pd-"+t).classList.add("active");render();}

function render(){
  const sl=cSL();
  document.getElementById("ml").textContent="Week "+getWeekNum()+" · "+dishes.filter(d=>d.active).length+" dishes · "+sl.length+" shopping items";
  if(tab==="dishes")rDishes();
  if(tab==="stock")rStock();
  if(tab==="tasks")rTasks();
  if(tab==="expenses")rExpenses();
  if(tab==="shopping")rShopping(sl);
  if(tab==="temps")rTemps();
  if(tab==="allergens")rAllergens();
  if(tab==="events")rEvents();
}

function rDishes(){const el=document.getElementById("pd-dishes");let h="";SECS.forEach(sec=>{const sd=dishes.filter(d=>d.sec===sec);if(!sd.length)return;const ac=sd.filter(d=>d.active).length;h+=`<div style="margin-bottom:1.4rem"><div style="display:flex;align-items:center;gap:7px;margin-bottom:7px"><span style="font-size:11px;font-weight:700;color:${STX[sec]};text-transform:uppercase;letter-spacing:.05em">${sec}</span><span style="font-size:11px;color:var(--text3)">${ac}/${sd.length} active</span></div><div class="card" style="margin-bottom:0">`;sd.forEach(d=>{const p=cP(d),exp=expId===d.id,edt=editId===d.id;if(edt){h+=`<div class="ef">${bEF(d)}</div>`;}else{h+=`<div class="dr"><div class="dh" onclick="tExp('${d.id}')"><div class="tog ${d.active?'on':'off'}" onclick="event.stopPropagation();tAct('${d.id}')"><div class="tdot" style="left:${d.active?'16px':'2px'}"></div></div><span class="dn ${d.active?'':'off'}">${d.name}</span><span class="sb" style="background:${SBG[d.sec]};color:${STX[d.sec]}">${d.sec}</span>${d.price>0?`<span style="font-size:12px;color:var(--text2)">£${d.price.toFixed(2)}</span>`:''}${d.active?`<span style="font-size:12px;color:var(--text2);white-space:nowrap">${p} portions</span>`:'<span style="font-size:11px;color:var(--text3)">inactive</span>'}<span style="font-size:11px;color:var(--text3)">${exp?'▲':'▼'}</span></div><div class="dd ${exp?'open':''}"><p class="nt">${(d.notes||'').replace(/\n/g,'<br>')}</p>${d.url?`<a href="${d.url}" target="_blank" style="font-size:12px;color:var(--blue);display:inline-block;margin-bottom:7px">Tutorial →</a>`:''}<table class="it"><thead><tr><th>Ingredient</th><th>Qty/portion</th><th>Category</th><th>Supplier</th></tr></thead><tbody>${(d.ings||[]).map(i=>`<tr><td>${i.name}</td><td style="color:var(--text2)">${i.qty} ${i.unit}</td><td class="m">${i.cat}</td><td>${tH(i.sup)}</td></tr>`).join("")}</tbody></table><div class="ra"><button class="btn" onclick="sEdit('${d.id}')">Edit</button><button class="btn d" onclick="dDish('${d.id}')">Delete</button></div></div></div>`;}});h+=`</div></div>`;});h+=`<button class="abtn" onclick="newDish()">+ Add new dish</button>`;el.innerHTML=h;}
function bEF(d){return`<p style="font-size:13px;font-weight:600;margin-bottom:9px">Editing: ${d.name}</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px"><div class="fg"><label>Name</label><input value="${d.name.replace(/"/g,'&quot;')}" onchange="uDF('${d.id}','name',this.value)"></div><div class="fg"><label>Section</label><select onchange="uDF('${d.id}','sec',this.value)">${SECS.map(s=>`<option value="${s}"${d.sec===s?' selected':''}>${s}</option>`).join("")}</select></div><div class="fg"><label>Price (£)</label><input type="number" value="${d.price}" onchange="uDF('${d.id}','price',parseFloat(this.value)||0)"></div><div class="fg"><label>Tutorial URL</label><input value="${(d.url||'').replace(/"/g,'&quot;')}" placeholder="https://..." onchange="uDF('${d.id}','url',this.value)"></div></div><div class="fg"><label>Notes / recipe / plating</label><textarea rows="4" onchange="uDF('${d.id}','notes',this.value)">${(d.notes||'').replace(/</g,'&lt;')}</textarea></div><p style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin:6px 0 3px">Ingredients per 1 portion</p><table class="ie"><thead><tr><th style="width:26%">Name</th><th style="width:8%">Qty</th><th style="width:7%">Unit</th><th style="width:15%">Category</th><th style="width:23%">Suppliers</th><th></th></tr></thead><tbody id="itb-${d.id}">${bIR(d)}</tbody></table><div style="display:flex;gap:7px;justify-content:space-between;margin-top:7px"><button class="btn" onclick="aIng('${d.id}')">+ Add ingredient</button><button class="btn p" onclick="dEdit()">Done</button></div>`;}
function bIR(d){return(d.ings||[]).map(i=>`<tr id="ir-${i.id}"><td><input value="${i.name.replace(/"/g,'&quot;')}" onchange="uIng('${d.id}','${i.id}','name',this.value)"></td><td><input type="number" value="${i.qty}" step="any" onchange="uIng('${d.id}','${i.id}','qty',parseFloat(this.value)||0)"></td><td><input value="${i.unit.replace(/"/g,'&quot;')}" onchange="uIng('${d.id}','${i.id}','unit',this.value)"></td><td><select onchange="uIng('${d.id}','${i.id}','cat',this.value)">${CATS.map(c=>`<option value="${c}"${i.cat===c?' selected':''}>${c}</option>`).join("")}</select></td><td><input value="${(i.sup||'').replace(/"/g,'&quot;')}" placeholder="Supplier" onchange="uIng('${d.id}','${i.id}','sup',this.value)"></td><td><button class="xb" onclick="dIng('${d.id}','${i.id}')">×</button></td></tr>`).join("");}

function rStock(){const el=document.getElementById("pd-stock");let h=`<div class="ib">Track batch production. All batches must be labelled with production date and expiry — UK Food Standards requirement.</div>`;const critical=stockItems.filter(s=>s.active&&daysLeft(s.expires_at)<=1);const warn=stockItems.filter(s=>s.active&&daysLeft(s.expires_at)>1&&daysLeft(s.expires_at)<=3);if(critical.length)h+=`<div style="background:#F8D7DA;border:1px solid #f5c6cb;border-radius:var(--r);padding:10px 13px;margin-bottom:.9rem;font-size:13px;color:#A32D2D"><strong>⚠ Expires today or tomorrow:</strong> ${critical.map(s=>s.name).join(', ')}</div>`;if(warn.length)h+=`<div style="background:#FFF3CD;border:1px solid #ffeeba;border-radius:var(--r);padding:10px 13px;margin-bottom:.9rem;font-size:13px;color:#854F0B"><strong>Use soon:</strong> ${warn.map(s=>s.name+' ('+daysLeft(s.expires_at)+'d)').join(', ')}</div>`;h+=`<div class="card"><div class="ch">Active batches <button class="btn sm" onclick="showAddStock()">+ Add batch</button></div>`;const active=stockItems.filter(s=>s.active);if(!active.length)h+=`<div style="padding:2rem;text-align:center;color:var(--text3);font-size:13px">No active batches.</div>`;active.forEach(s=>{const dl=daysLeft(s.expires_at);const cls=dl<=1?'exp-critical':dl<=3?'exp-warn':'exp-ok';const label=dl<=0?'Expired':dl===1?'Expires today':dl+'d left';h+=`<div class="stock-row"><div style="flex:1"><div class="stock-name">${s.name}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${s.quantity} · Made: ${fmtDate(s.produced_at)}${s.notes?` · ${s.notes}`:''}</div></div><span class="stock-exp ${cls}">${label}</span><button class="btn sm d" onclick="archiveStock(${s.id})">Done</button></div>`;});h+=`</div>`;const archived=stockItems.filter(s=>!s.active).slice(0,8);if(archived.length){h+=`<div class="card"><div class="ch">Recent history</div>`;archived.forEach(s=>{h+=`<div class="stock-row" style="opacity:.6"><div style="flex:1"><div class="stock-name">${s.name}</div><div style="font-size:11px;color:var(--text2)">Made: ${fmtDate(s.produced_at)} · Expired: ${fmtDate(s.expires_at)}</div></div></div>`;});h+=`</div>`;}h+=`<div id="add-stock-form" style="display:none"><div class="card"><div class="ch">New batch</div><div style="padding:13px;display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Product name</label><input id="sn" placeholder="e.g. Birria batch"></div><div class="fg"><label>Quantity</label><input id="sq" placeholder="e.g. 2 containers 4L"></div><div class="fg"><label>Production date</label><input type="date" id="sp" value="${todayISO()}"></div><div class="fg"><label>Expiry date</label><input type="date" id="se" value="${new Date(Date.now()+4*86400000).toISOString().slice(0,10)}"></div><div class="fg" style="grid-column:1/-1"><label>Notes</label><input id="sno" placeholder="Optional"></div></div><div style="padding:0 13px 13px;display:flex;gap:7px"><button class="btn grn" onclick="addStock()">Save batch</button><button class="btn" onclick="document.getElementById('add-stock-form').style.display='none'">Cancel</button></div></div></div>`;el.innerHTML=h;}
function showAddStock(){document.getElementById("add-stock-form").style.display="block";document.getElementById("add-stock-form").scrollIntoView({behavior:"smooth"});}
async function addStock(){const n=document.getElementById("sn")?.value?.trim();if(!n)return;const s=await apiPost('/api/stock',{name:n,quantity:document.getElementById("sq")?.value||"",produced_at:document.getElementById("sp")?.value,expires_at:document.getElementById("se")?.value,notes:document.getElementById("sno")?.value||""});stockItems.unshift(s);rStock();}
async function archiveStock(id){await apiPatch('/api/stock/'+id,{active:false});stockItems=stockItems.map(s=>s.id===id?{...s,active:false}:s);rStock();}

function rTasks(){const el=document.getElementById("pd-tasks");const today=new Date().toLocaleDateString('en-GB',{weekday:'long'}).toLowerCase();let h=`<div class="ib">Tasks saved to server — visible from any device. Today is <strong>${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</strong>.</div>`;TASK_DAYS.forEach(({key,label})=>{const isToday=label==="Today";const items=taskItems[key]||[];const done=items.filter(t=>t.done).length;h+=`<div class="card" style="margin-bottom:.8rem"><div class="ch" style="${isToday?'background:#EAF3DE;color:#3B6D11':''}">${label}${isToday?' — today':''} <span style="font-weight:400;font-size:11px">${done}/${items.length} done</span></div>`;if(items.length){items.forEach(t=>{h+=`<div class="task-row"><input type="checkbox" id="t${t.id}" ${t.done?'checked':''} onchange="toggleTask(${t.id},this.checked,'${key}')"><label for="t${t.id}" class="${t.done?'done':''}">${t.text}</label><button class="del-t" onclick="deleteTask(${t.id},'${key}')">×</button></div>`;});}h+=`<div class="add-task-row"><input type="text" placeholder="Add task..." id="ti-${key}" onkeydown="if(event.key==='Enter')addTask('${key}')"><button class="btn sm" onclick="addTask('${key}')">+ Add</button></div></div>`;});el.innerHTML=h;}
async function addTask(key){const inp=document.getElementById("ti-"+key);const text=inp?.value?.trim();if(!text)return;const t=await apiPost('/api/tasks',{day_key:key,text});if(!taskItems[key])taskItems[key]=[];taskItems[key].push(t);inp.value="";rTasks();}
async function toggleTask(id,done,key){await apiPatch('/api/tasks/'+id,{done});taskItems[key]=taskItems[key].map(t=>t.id===id?{...t,done}:t);rTasks();}
async function deleteTask(id,key){await apiDel('/api/tasks/'+id);taskItems[key]=taskItems[key].filter(t=>t.id!==id);rTasks();}

// EXPENSES
function rExpenses(){
  const el=document.getElementById("pd-expenses");
  const total=expenses.reduce((s,e)=>s+parseFloat(e.total_price||0),0);
  const thisWeekStart=new Date();thisWeekStart.setDate(thisWeekStart.getDate()-thisWeekStart.getDay()+1);
  const weekExp=expenses.filter(e=>new Date(e.expense_date)>=thisWeekStart).reduce((s,e)=>s+parseFloat(e.total_price||0),0);
  const byCategory={};expenses.forEach(e=>{const c=e.category||"Other";byCategory[c]=(byCategory[c]||0)+parseFloat(e.total_price||0);});
  const topCat=Object.entries(byCategory).sort((a,b)=>b[1]-a[1])[0];

  let h=`<div class="summary-grid">
    <div class="summary-card"><div class="summary-label">This week</div><div class="summary-value">£${weekExp.toFixed(2)}</div><div class="summary-sub">Mon–Sun</div></div>
    <div class="summary-card"><div class="summary-label">All time</div><div class="summary-value">£${total.toFixed(2)}</div><div class="summary-sub">${expenses.length} entries</div></div>
    ${topCat?`<div class="summary-card"><div class="summary-label">Top category</div><div class="summary-value" style="font-size:16px">${topCat[0]}</div><div class="summary-sub">£${topCat[1].toFixed(2)} total</div></div>`:''}
  </div>`;

  // Add form
  h+=`<div class="card" style="margin-bottom:.9rem"><div class="ch">Add expense</div>
  <div class="exp-form">
    <div class="fg"><label>Date</label><input type="date" id="ed" value="${todayISO()}"></div>
    <div class="fg"><label>Supplier / Store</label><input id="es" placeholder="e.g. Tesco, MexGrocer, Local butcher"></div>
    <div class="fg"><label>Product</label><input id="ep" placeholder="e.g. Tiger prawns 1kg"></div>
    <div class="fg"><label>Category</label><select id="ec">${EXP_CATS.map(c=>`<option value="${c}">${c}</option>`).join("")}</select></div>
    <div class="fg"><label>Quantity</label><input id="eq" type="number" step="any" placeholder="e.g. 2"></div>
    <div class="fg"><label>Unit</label><input id="eu" placeholder="e.g. kg, pcs, L"></div>
    <div class="fg"><label>Total price (£)</label><input id="epr" type="number" step="0.01" placeholder="0.00"></div>
    <div class="fg"><label>Notes</label><input id="en" placeholder="Optional"></div>
  </div>
  <div style="padding:0 13px 13px"><button class="btn grn" onclick="addExpense()">Save expense</button></div>
  </div>`;

  // Filter bar
  h+=`<div class="filter-bar">
    <label style="font-size:12px;color:var(--text2)">Filter:</label>
    <input type="date" id="ef-from" placeholder="From" onchange="filterExpenses()">
    <input type="date" id="ef-to" placeholder="To" onchange="filterExpenses()">
    <select id="ef-cat" onchange="filterExpenses()"><option value="all">All categories</option>${EXP_CATS.map(c=>`<option value="${c}">${c}</option>`).join("")}</select>
    <button class="btn sm" onclick="clearFilters()">Clear</button>
    <button class="btn sm p" onclick="copyExpenses()">Copy list</button>
  </div>`;

  // Expenses by category
  const filtered=getFilteredExpenses();
  const grouped={};
  filtered.forEach(e=>{const c=e.category||"Other";if(!grouped[c])grouped[c]=[];grouped[c].push(e);});

  if(!filtered.length){h+=`<div style="padding:3rem;text-align:center;color:var(--text3);font-size:13px">No expenses yet. Add your first one above.</div>`;}
  else{
    Object.entries(grouped).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([cat,items])=>{
      const catTotal=items.reduce((s,e)=>s+parseFloat(e.total_price||0),0);
      h+=`<div class="card"><div class="ch">${cat} <span style="font-weight:400">· £${catTotal.toFixed(2)}</span></div>`;
      items.forEach(e=>{
        const unitStr=e.quantity&&e.unit?` · ${e.quantity} ${e.unit}`:'';
        h+=`<div class="exp-row">
          <div style="flex:1"><div class="exp-product">${e.product}${unitStr}</div><div class="exp-supplier">${e.supplier}${e.notes?` · ${e.notes}`:''}</div></div>
          <span class="exp-price">£${parseFloat(e.total_price).toFixed(2)}</span>
          <span class="exp-date">${fmtDate(e.expense_date)}</span>
          <button class="xb" onclick="deleteExpense(${e.id})">×</button>
        </div>`;
      });
      h+=`</div>`;
    });
  }
  el.innerHTML=h;
}

function getFilteredExpenses(){
  const from=document.getElementById("ef-from")?.value;
  const to=document.getElementById("ef-to")?.value;
  const cat=document.getElementById("ef-cat")?.value;
  return expenses.filter(e=>{
    if(from&&e.expense_date<from)return false;
    if(to&&e.expense_date>to)return false;
    if(cat&&cat!=="all"&&e.category!==cat)return false;
    return true;
  });
}
function filterExpenses(){rExpenses();}
function clearFilters(){const f=document.getElementById("ef-from");const t=document.getElementById("ef-to");const c=document.getElementById("ef-cat");if(f)f.value="";if(t)t.value="";if(c)c.value="all";rExpenses();}

async function addExpense(){
  const price=document.getElementById("epr")?.value;
  const supplier=document.getElementById("es")?.value?.trim();
  const product=document.getElementById("ep")?.value?.trim();
  if(!price||!supplier||!product){alert("Date, supplier, product and price are required");return;}
  const e=await apiPost('/api/expenses',{
    expense_date:document.getElementById("ed")?.value||todayISO(),
    supplier,product,
    quantity:document.getElementById("eq")?.value||null,
    unit:document.getElementById("eu")?.value||null,
    total_price:parseFloat(price),
    category:document.getElementById("ec")?.value||"Other",
    notes:document.getElementById("en")?.value||""
  });
  expenses.unshift(e);
  // clear form
  ["es","ep","eq","eu","epr","en"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  rExpenses();
}

async function deleteExpense(id){if(!confirm("Delete this expense?"))return;await apiDel('/api/expenses/'+id);expenses=expenses.filter(e=>e.id!==id);rExpenses();}

function copyExpenses(){
  const filtered=getFilteredExpenses();
  const grouped={};filtered.forEach(e=>{const c=e.category||"Other";if(!grouped[c])grouped[c]=[];grouped[c].push(e);});
  const total=filtered.reduce((s,e)=>s+parseFloat(e.total_price||0),0);
  const lines=["MAÑANA — EXPENSE REPORT","Week "+getWeekNum()+" · "+new Date().toLocaleDateString('en-GB'),"=".repeat(40),""];
  Object.entries(grouped).forEach(([cat,items])=>{
    const ct=items.reduce((s,e)=>s+parseFloat(e.total_price||0),0);
    lines.push(cat.toUpperCase()+" — £"+ct.toFixed(2));
    items.forEach(e=>lines.push(`  ${fmtDate(e.expense_date)} · ${e.supplier} · ${e.product} · £${parseFloat(e.total_price).toFixed(2)}`));
    lines.push("");
  });
  lines.push("TOTAL: £"+total.toFixed(2));
  navigator.clipboard.writeText(lines.join("\n")).then(()=>{const b=document.querySelector("#pd-expenses .btn.sm.p");if(b){b.textContent="Copied!";setTimeout(()=>b.textContent="Copy list",2000);}}).catch(()=>alert(lines.join("\n")));
}

function rShopping(sl){const el=document.getElementById("pd-shopping");if(!sl)sl=cSL();const gr={};sl.forEach(i=>{if(!gr[i.cat])gr[i.cat]=[];gr[i.cat].push(i);});let h=`<div class="tb"><p style="font-size:13px;color:var(--text2)">${sl.length} ingredients · hover to see which dishes</p><button class="btn p" onclick="cpSL()">Copy list</button></div>`;Object.entries(gr).forEach(([cat,items])=>{h+=`<div class="sl-cat"><span class="sl-cat-label">${cat}</span><div class="sl-rows">`;items.forEach(item=>{h+=`<div class="sl-row"><span class="sl-name">${item.name}</span><span class="sl-qty">${rQ(item.total,item.unit)}</span><div class="sl-sup">${tH(item.sup)}</div>${item.usedIn.length?`<div class="sl-tt">${item.usedIn.join('<br>')}</div>`:''}</div>`;});h+=`</div></div>`;});if(!sl.length)h+=`<div style="padding:3rem;text-align:center;color:var(--text3);font-size:13px">No active dishes.</div>`;el.innerHTML=h;}

function rTemps(){const el=document.getElementById("pd-temps");let h=`<div class="ib">UK Food Standards: fridge must be <strong>below 8°C</strong> (target 5°C). Freezer <strong>below -18°C</strong>. Log every day before service.</div>`;h+=`<div class="card"><div class="ch">Log today's temperatures</div><div class="temp-form"><div><label>Fridge (°C)</label><input type="number" id="tf" placeholder="5" step="0.1"></div><div><label>Freezer (°C)</label><input type="number" id="tfc" placeholder="-20" step="0.1"></div><div><label>Notes</label><input id="tn" placeholder="Optional"></div><div><button class="btn grn" onclick="logTemp()" style="width:100%;margin-top:18px">Log</button></div></div></div>`;h+=`<div class="card"><div class="ch">History (last 30 days)</div>`;if(!tempLogs.length)h+=`<div style="padding:2rem;text-align:center;color:var(--text3);font-size:13px">No logs yet.</div>`;tempLogs.forEach(t=>{const fd=parseFloat(t.fridge_temp),fc=parseFloat(t.freezer_temp);const fcls=fd<=8?'temp-ok':'temp-bad',fccls=fc<=-18?'temp-ok':'temp-bad';const dt=new Date(t.logged_at).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});h+=`<div class="temp-row"><span style="color:var(--text2);font-size:12px;flex:1">${dt}</span><span>Fridge: <span class="temp-val ${fcls}">${fd}°C</span></span><span>Freezer: <span class="temp-val ${fccls}">${fc}°C</span></span>${t.notes?`<span style="font-size:11px;color:var(--text2)">${t.notes}</span>`:''}</div>`;});h+=`</div>`;el.innerHTML=h;}
async function logTemp(){const f=document.getElementById("tf")?.value,fc=document.getElementById("tfc")?.value;if(!f||!fc){alert("Enter both temperatures");return;}const t=await apiPost('/api/temps',{fridge_temp:f,freezer_temp:fc,notes:document.getElementById("tn")?.value||""});tempLogs.unshift(t);rTemps();}

function rAllergens(){const el=document.getElementById("pd-allergens");const ad=dishes.filter(d=>d.active&&d.price>0);let h=`<div class="ib">UK law requires allergen information for all dishes. 14 major allergens listed. Keep updated and available for staff and customers.</div><div style="overflow-x:auto"><table class="allg-table"><thead><tr><th>Dish</th>`;ALLERGENS.forEach(a=>{h+=`<th style="writing-mode:vertical-rl;transform:rotate(180deg);padding:8px 4px;min-width:28px">${a}</th>`;});h+=`</tr></thead><tbody>`;ad.forEach((d,idx)=>{const da=DISH_ALLERGENS[d.name]||[];h+=`<tr style="${idx%2===0?'background:var(--bg2)':''}"><td style="padding:6px 8px;font-weight:500">${d.name}</td>`;ALLERGENS.forEach(a=>{h+=`<td style="text-align:center;padding:4px">${da.includes(a)?`<span class="allg-dot"></span>`:`<span class="allg-none">·</span>`}</td>`;});h+=`</tr>`;});h+=`</tbody></table></div><div style="margin-top:1rem;font-size:12px;color:var(--text2);line-height:1.7"><strong>Note:</strong> Verify with recipes as ingredients may vary. Always inform customers before ordering.</div>`;el.innerHTML=h;}

function rEvents(){const el=document.getElementById("pd-events");let h=`<div class="ib">Set expected covers per service to drive the shopping list and portion calculations.</div><div class="card"><div class="ch">Weekly service covers — Week ${getWeekNum()}</div>`;events.forEach((ev,i)=>{h+=`<div style="padding:11px 13px;${i?'border-top:1px solid var(--border)':''}""><div style="font-size:14px;font-weight:500;margin-bottom:7px">${ev.name}</div><div class="evg"><div class="evf"><label>Covers</label><input type="number" value="${ev.covers}" min="0" max="300" onchange="uEv('${ev.id}','covers',this.value)"></div><div class="evf"><label>Tapa ratio</label><input type="number" value="${ev.tapaR}" min="0" max="2" step="0.05" onchange="uEv('${ev.id}','tapaR',this.value)"></div><div class="evf"><label>Main ratio</label><input type="number" value="${ev.mainR}" min="0" max="2" step="0.05" onchange="uEv('${ev.id}','mainR',this.value)"></div><div class="evf"><label>Taco ratio</label><input type="number" value="${ev.tacoR}" min="0" max="2" step="0.05" onchange="uEv('${ev.id}','tacoR',this.value)"></div><div class="evf"><label>Salsa batches</label><input type="number" value="${ev.salsaB}" min="0" max="10" onchange="uEv('${ev.id}','salsaB',this.value)"></div></div></div>`;});h+=`</div><div class="card"><div class="ch">Portions — this week combined</div>`;SECS.forEach(sec=>{const sd=dishes.filter(d=>d.sec===sec&&d.active);if(!sd.length)return;h+=`<div style="padding:4px 13px;background:${SBG[sec]}50;border-top:1px solid var(--border)"><span style="font-size:11px;font-weight:700;color:${STX[sec]};text-transform:uppercase;letter-spacing:.04em">${sec}</span></div>`;sd.forEach(d=>{h+=`<div class="pr"><span>${d.name}</span><span style="font-weight:600;color:var(--text2)">${cP(d)} portions</span></div>`;});});h+=`</div>`;el.innerHTML=h;}

function tExp(id){expId=(expId===id?null:id);editId=null;rDishes();}
function tAct(id){dishes=dishes.map(d=>d.id===id?{...d,active:!d.active}:d);saveDishes();render();}
function sEdit(id){editId=id;expId=null;rDishes();}
function dEdit(){editId=null;saveDishes();render();}
function uDF(id,f,v){dishes=dishes.map(d=>d.id===id?{...d,[f]:v}:d);}
function uIng(dId,iId,f,v){dishes=dishes.map(d=>d.id===dId?{...d,ings:d.ings.map(i=>i.id===iId?{...i,[f]:v}:i)}:d);}
function dIng(dId,iId){dishes=dishes.map(d=>d.id===dId?{...d,ings:d.ings.filter(i=>i.id!==iId)}:d);const r=document.getElementById("ir-"+iId);if(r)r.remove();}
function aIng(dId){const ni=ig("",0,"g","Produce","");dishes=dishes.map(d=>d.id===dId?{...d,ings:[...d.ings,ni]}:d);const tb=document.getElementById("itb-"+dId);if(tb){const d=dishes.find(x=>x.id===dId);tb.innerHTML=bIR(d);}}
function dDish(id){if(!confirm("Delete this dish?"))return;dishes=dishes.filter(d=>d.id!==id);if(expId===id)expId=null;saveDishes();render();}
function uEv(id,f,v){events=events.map(e=>e.id===id?{...e,[f]:parseFloat(v)||0}:e);saveEvents();render();}
function newDish(){const name=prompt("New dish name:");if(!name?.trim())return;const si=parseInt(prompt("Section:\n"+SECS.map((s,i)=>`${i+1}. ${s}`).join("\n")))||2;const sec=SECS[Math.max(0,Math.min(si-1,SECS.length-1))];const price=parseFloat(prompt("Price (£):")||"0")||0;const nd={id:uid(),name:name.trim(),sec,active:true,price,url:"",notes:"",ings:[]};dishes=[...dishes,nd];editId=nd.id;expId=null;saveDishes();render();}
function cpSL(){const sl=cSL(),gr={};sl.forEach(i=>{if(!gr[i.cat])gr[i.cat]=[];gr[i.cat].push(i);});const lines=["MAÑANA — SHOPPING LIST","Week "+getWeekNum()+" · "+new Date().toLocaleDateString('en-GB'),"=".repeat(40),""];Object.entries(gr).forEach(([cat,items])=>{lines.push(cat.toUpperCase());items.forEach(i=>lines.push("  "+i.name+": "+rQ(i.total,i.unit)+(i.sup?" ("+i.sup+")":"")));lines.push("");});navigator.clipboard.writeText(lines.join("\n")).then(()=>{const b=document.querySelector("#pd-shopping .btn.p");if(b){b.textContent="Copied!";setTimeout(()=>b.textContent="Copy list",2000);}}).catch(()=>alert(lines.join("\n")));}

init();
</script>
