<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mañana · Kitchen Planning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f6f6f4;
      --bg3: #efefec;
      --text: #1a1a1a;
      --text2: #6b6b6b;
      --text3: #aaaaaa;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.2);
      --green: #1D9E75;
      --blue: #185FA5;
      --red: #E24B4A;
      --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
    #app { max-width: 920px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 2px; }
    #ml { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); overflow-x: auto; margin-bottom: 1.5rem; }
    .tab { padding: 7px 14px; font-size: 13px; cursor: pointer; border: none; background: transparent; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; flex-shrink: 0; font-family: inherit; }
    .tab.active { color: var(--text); border-bottom: 2px solid var(--text); font-weight: 500; }
    .panel { display: none; } .panel.active { display: block; }
    .card { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; background: var(--bg); }
    .ch { padding: 8px 14px; background: var(--bg2); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); border-bottom: 1px solid var(--border); }
    .dr { border-top: 1px solid var(--border); background: var(--bg); }
    .dr:first-child { border-top: none; }
    .dh { display: flex; align-items: center; gap: 9px; padding: 10px 14px; cursor: pointer; flex-wrap: wrap; }
    .dn { flex: 1; font-size: 14px; font-weight: 500; min-width: 100px; }
    .dn.off { color: var(--text3); }
    .sb { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .tg { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); margin: 1px 2px 1px 0; }
    .dd { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
    .dd.open { display: block; }
    .nt { font-size: 12px; color: var(--text2); font-style: italic; margin: 10px 0 8px; line-height: 1.6; }
    table.it { width: 100%; font-size: 12px; border-collapse: collapse; }
    table.it th { color: var(--text3); font-weight: 600; padding: 4px 5px 4px 0; text-align: left; font-size: 11px; }
    table.it td { padding: 5px 5px 5px 0; border-top: 1px solid var(--border); }
    table.it td.m { color: var(--text3); font-size: 11px; }
    .ra { display: flex; gap: 8px; margin-top: 10px; }
    .btn { padding: 5px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-family: inherit; }
    .btn:hover { background: var(--bg2); }
    .btn.d { border-color: var(--red); color: var(--red); }
    .btn.p { border-color: var(--border2); font-weight: 600; }
    .btn.sm { padding: 3px 10px; font-size: 11px; }
    .btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .tog { width: 32px; height: 18px; border-radius: 9px; border: 1px solid #ccc; position: relative; cursor: pointer; flex-shrink: 0; transition: background .15s; }
    .tog.on { background: var(--green); border-color: var(--green); }
    .tog.off { background: var(--bg3); }
    .tdot { position: absolute; top: 2px; width: 12px; height: 12px; border-radius: 50%; background: white; transition: left .15s; }
    .ef { padding: 14px; background: var(--bg2); border-top: 1px solid var(--border); }
    .fg { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
    .fg label { font-size: 11px; color: var(--text2); font-weight: 500; }
    .fg input, .fg select, .fg textarea { width: 100%; font-size: 12px; padding: 6px 8px; border: 1px solid var(--border2); border-radius: 6px; background: var(--bg); color: var(--text); font-family: inherit; }
    .fg textarea { resize: vertical; }
    table.ie { width: 100%; font-size: 11px; border-collapse: collapse; margin-bottom: 8px; }
    table.ie th { font-size: 10px; color: var(--text3); font-weight: 600; padding: 2px 3px; text-align: left; }
    table.ie td { padding: 2px 2px; border-top: 1px solid var(--border); }
    table.ie input, table.ie select { width: 100%; font-size: 11px; padding: 3px 5px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-family: inherit; }
    .xb { background: transparent; border: none; cursor: pointer; color: var(--red); font-size: 16px; padding: 0 4px; line-height: 1; }
    .evg { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; }
    .evf label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 3px; font-weight: 500; }
    .evf input { width: 100%; font-size: 13px; padding: 6px 8px; border: 1px solid var(--border2); border-radius: 6px; background: var(--bg); color: var(--text); font-weight: 600; font-family: inherit; }
    .pr { display: flex; justify-content: space-between; padding: 7px 14px; border-top: 1px solid var(--border); font-size: 13px; }
    .wi { width: 54px; font-size: 12px; padding: 3px 5px; border: 1px solid var(--border2); border-radius: 5px; background: var(--bg); color: var(--text); text-align: center; font-family: inherit; }
    .abtn { width: 100%; padding: 11px; border: 1px dashed var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; margin-top: 4px; font-family: inherit; }
    .abtn:hover { background: var(--bg2); }
    .ib { padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; color: var(--text2); margin-bottom: 1rem; line-height: 1.6; }
    /* Shopping list */
    .sl-cat { margin-bottom: 1.2rem; }
    .sl-cat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text2); margin-bottom: 5px; display: block; }
    .sl-rows { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg); }
    .sl-row { display: flex; align-items: center; gap: 12px; padding: 9px 14px; border-top: 1px solid var(--border); font-size: 13px; position: relative; cursor: default; }
    .sl-row:first-child { border-top: none; }
    .sl-row:nth-child(even) { background: var(--bg2); }
    .sl-row:hover .sl-tt { display: block; }
    .sl-name { flex: 1; }
    .sl-qty { font-size: 15px; font-weight: 700; min-width: 70px; text-align: right; }
    .sl-sup { display: flex; flex-wrap: wrap; gap: 2px; min-width: 80px; justify-content: flex-end; }
    .sl-tt { display: none; position: absolute; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 10px; font-size: 11px; color: var(--text2); z-index: 10; max-width: 240px; top: 100%; right: 14px; line-height: 1.6; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .tb { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
    /* Plan */
    .pd { margin-bottom: .8rem; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg); }
    .ph { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
    .pt { font-size: 14px; font-weight: 600; }
    .ps { font-size: 12px; color: var(--text2); }
    .pb { padding: 4px 14px 12px; }
    .tk { display: flex; gap: 9px; align-items: flex-start; padding: 5px 0; border-top: 1px solid var(--border); font-size: 13px; }
    .tk:first-child { border-top: none; }
    .tk input[type=checkbox] { margin-top: 3px; flex-shrink: 0; cursor: pointer; accent-color: var(--green); width: 14px; height: 14px; }
    .tk label { color: var(--text); line-height: 1.55; cursor: pointer; flex: 1; }
    .tk label.done { color: var(--text3); text-decoration: line-through; }
    .tk .qv { font-weight: 700; color: var(--blue); font-size: 12px; white-space: nowrap; }
    .ts { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); margin: 10px 0 3px; padding-top: 6px; border-top: 1px solid var(--border); }
    .ts:first-child { border-top: none; margin-top: 4px; }
  </style>
</head>

function standardize(dishes){
  return dishes.map(d=>({...d,ings:(d.ings||[])
    .filter(i=>i.name!=="Fresh lime zest")
    .map(i=>{
      let{name:n,qty:q,unit:u,cat:c,sup:s}=i;
      if(n==="Garlic"&&u==="pcs"){q=q*5;u="g";}
      if(n==="White onion"){if(u==="pcs"){q=+(q*0.15).toFixed(3);u="kg";}else if(u==="g"){q=+(q/1000).toFixed(3);u="kg";}}
      if(n==="Red onion"){if(u==="pcs"){q=+(q*0.15).toFixed(3);u="kg";}else if(u==="g"){q=+(q/1000).toFixed(3);u="kg";}}
      if(n==="Fresh tomato"){if(u==="pcs"){q=+(q*0.12).toFixed(3);u="kg";}else if(u==="g"){q=+(q/1000).toFixed(3);u="kg";}}
      if(n==="Tortilla chips"){n="White corn tortilla (12cm)";q=+(q/1000).toFixed(3);u="kg";}
      if(n==="White corn tortilla (12cm)"&&u==="pcs"){q=+(q/60).toFixed(3);u="kg";}
      if(n==="White corn tortilla (12cm)"&&u==="g"){q=+(q/1000).toFixed(3);u="kg";}
      if(n==="Black corn tortilla (12cm)"&&u==="pcs"){q=+(q/60).toFixed(3);u="kg";}
      if(n==="Black corn tortilla (12cm)"&&u==="g"){q=+(q/1000).toFixed(3);u="kg";}
      if(n.includes("(16cm)")){n=n.replace("(16cm)","(15cm)");if(u==="pcs"){q=+(q/40).toFixed(3);u="kg";}}
      return{...i,name:n,qty:q,unit:u,cat:c,sup:s};
    })
  }));
}

function load(){

  render();
}
function save(){store.set("manana-v5",JSON.stringify({dishes,events,week}));}

function cP(d,src){
  if(!d.active)return 0;
  const ev=src==="week"?DAYS.map(day=>({covers:week[day]?.covers||0,tapaR:week[day]?.tapaR||0,mainR:week[day]?.mainR||0,tacoR:week[day]?.tacoR||0,salsaB:week[day]?.salsaB||0})):events;
  return Math.round(ev.reduce((s,e)=>{let r=0;if(d.sec==="Sauces")r=e.salsaB;else if(d.name.toLowerCase().includes("taco"))r=e.tacoR*e.covers;else if(["Para Picar","Tapas"].includes(d.sec))r=e.tapaR*e.covers;else r=e.mainR*e.covers;return s+r;},0));
}
function cSL(src){const a={};dishes.forEach(d=>{const p=cP(d,src);if(p<=0)return;(d.ings||[]).forEach(i=>{const k=i.name.trim().toLowerCase()+"__"+i.unit.trim().toLowerCase();if(!a[k])a[k]={name:i.name.trim(),unit:i.unit.trim(),cat:i.cat||"Other",sup:i.sup||"",total:0,usedIn:[]};a[k].total+=(parseFloat(i.qty)||0)*p;if(!a[k].usedIn.includes(d.name))a[k].usedIn.push(d.name);});});return Object.values(a).sort((a,b)=>a.cat.localeCompare(b.cat)||a.name.localeCompare(b.name));}
function rQ(t,u){if(t<=0)return"—";const un=u.toLowerCase();if(un==="g"){if(t<100)return Math.ceil(t/10)*10+"g";if(t<500)return Math.ceil(t/50)*50+"g";if(t<2000)return Math.ceil(t/100)*100+"g";return(Math.ceil(t/500)*0.5).toFixed(1)+"kg";}if(un==="ml"){if(t<200)return Math.ceil(t/10)*10+"ml";if(t<1000)return Math.ceil(t/100)*100+"ml";return(Math.ceil(t/500)*0.5).toFixed(1)+"L";}if(un==="pcs")return Math.ceil(t)+" pcs";if(un==="kg")return(Math.ceil(t*10)/10).toFixed(1)+"kg";if(un==="slice")return"~"+Math.ceil(t/10)+" loaves";return t.toFixed(1)+" "+u;}

  const days=[
    {date:"Monday 6 Apr",sub:"3 hrs · Setup & organization — no cooking today",bg:"#E8F4FD",tasks:[{s:"Kitchen setup",items:[["Clean all surfaces, shelves, fridge trays. Organize mise en place stations (hot side / cold side / pastry)."],["Test all equipment: oven temp with thermometer, plancha heat, fryer oil level, airfryer, fridge+freezer temps — note anything off."],["Organize existing inventory: label all shelves, check dry store, meat, produce. Note what's missing."],["Set up and label all GN containers and squeeze bottles before you need them."],["Brief with Sylvi: confirm plan for the week, tortilla delivery from Mextrade confirmed, who handles what."]]}]},
    {date:"Tuesday 7 Apr",sub:"12:00–22:00 · Recipe tests + overnight marinades",bg:"#EAF3DE",tasks:[{s:"Recipe tests — do these first while you still have time to adjust",items:[["TEST carlota de limón: make a test batch now → portion 2–3 glasses → overnight chill → check texture Wednesday morning."],["TEST batatas bravas: pre-cook potatoes, press flat, fry a few → check crispness and timing."],["TEST calamares in airfryer: try 190°C 8 min vs 200°C 10 min → compare and lock in the right setting."],["TEST alioli with immersion blender → check emulsion and seasoning."]]},{s:"Base sauces (while you recover from the tests)",items:[["Make enchilada red sauce batch: guajillo + ancho + tomato + garlic. Cool & refrigerate. Keeps 4 days."],["Make chicken stock: 3–4L. Simmer 2hrs. Cool. Refrigerate."]]},{s:"Overnight marinades — MUST be done before you leave tonight",items:[["BIRRIA: soak ancho+guajillo+árbol 30 min → blend with tomato+garlic+spices → submerge beef, cover, refrigerate.",birria+"kg beef joint"],["COCHINITA: blend achiote+orange+lime+garlic+cumin+oregano → rub pork all over, wrap tight in foil, refrigerate.",cochi+"kg pork shoulder"],["ASADA: soy+garlic+lime → coat steak, refrigerate.",asada+"kg steak"]]}]},
    {date:"Wednesday 8 Apr",sub:"12:00–22:00 · Protein production day",bg:"#D4EDDA",tasks:[{s:"Start long cooks first — they run while you prep everything else",items:[["BRAISE BIRRIA: 160°C low & slow 3–4hrs. When done, shred while warm. Reserve ALL consommé in separate container.",birria+"kg raw → ~"+(Math.ceil(birria*0.63*10)/10)+"kg cooked"],["ROAST COCHINITA: sealed foil at 160°C 2–3hrs. Shred. Reserve juices + achiote oil.",cochi+"kg raw → ~"+(Math.ceil(cochi*0.63*10)/10)+"kg cooked"]]},{s:"While the proteins cook",items:[["Poach & shred chicken thighs for enchiladas ("+ch_enc+"kg) + mole ("+ch_mol+"kg) = "+ch_tot+"kg total raw thighs."],["Make chicken mole: paste + stock + cooked chicken thighs, simmer 20 min → cool & refrigerate. → "+P["Chicken mole with rice"]+" portions."],["Pickle red onion for cochinita: thin slices + lime juice + white wine vinegar → refrigerate."],["Pre-cook & press potatoes for batatas bravas: boil, cool, press flat on baking trays → refrigerate."],["Make salata russa: cook veg, dice, mix with mayo → refrigerate covered."]]}]},
    {date:"Thursday 9 Apr",sub:"12:00–22:00 · Salsas + complete mise en place for Day 10",bg:"#FFF3CD",tasks:[{s:"Make all salsas (open window — habanero goes first)",items:[["Salsa Negra Habanero: toast habaneros dry, blend all ingredients → fill labeled squeeze bottle."],["Salsa Verde Taquera: roast tomatillos+jalapeño under grill until charred → blend with avocado, coriander, onion → squeeze bottle."],["Salsa Roja Tatemada: roast tomatoes+árbol+garlic+onion under grill → blend, season → squeeze bottle."],["Alioli: blend egg+garlic, add oil very slowly → fill squeeze bottle(s)."],["Pico de Gallo: dice all ingredients, season → refrigerate in GN container."],["Guacamole Base: blend → cover surface with cling film immediately."],]},{s:"Freeze portions",items:[["Batter calamares: flour → egg → breadcrumbs → portion in individual freezer bags → FREEZE."],["Portion croquettes into individual serving bags → FREEZE."]]},{s:"Make carlota de limón for service (night before is essential)",items:[["Layer biscuits + cream mixture, repeat → pour into individual glasses → overnight chill (minimum 6hrs).",carlota+" individual glasses"]]},{s:"Complete mise en place for buffet Day 10",items:[["Pre-portion nachos toppings in labeled GN containers: cheese, beans, jalapeños, pico, crème fraîche, guacamole."],["Assemble charcuterie boards → cover with cling film, refrigerate."],["Fill ALL squeeze bottles: brava sauce, crème fraîche, all 4 salsas."],["Prep garnish station: coriander picked & washed, white onion finely diced, lime wedges cut, parsley washed."],["Warm test: birria + consommé, cochinita, mole → taste and adjust seasoning if needed."],["Brief with Sylvi: confirm buffet layout, stations, who does what, guest arrival time."]]}]},
    {date:"Friday 10 Apr",sub:`12:00–22:00 · Soft open — friends & family buffet · ${events.find(e=>e.id==="d10")?.covers||0} guests`,bg:"#F8D7DA",tasks:[{s:"Set up by 11:30 — heat everything from 11:00",items:[["Heat birria+consommé, cochinita, mole in bain marie from 11:00."],["Station 1 — Para Picar: nachos (DIY), charcuterie, guacamole."],["Station 2 — Tapas: batatas, calamares+croquettes (fry from frozen when guests arrive), gambas, chorizo, padrón, quesadilla, corn, salata russa."],["Station 3 — Taco bar: warm tortillas in tortillero, 3 fillings in pots, toppings in bowls."],["Station 4 — Dessert: carlota glasses."]]},{s:"During service",items:[["Note which stations get the most traffic."],["Note which dishes people go back to."],["Note anything cold, slow or tricky to serve in buffet format."]]},{s:"Post-service — prep for Saturday",items:[["Full mise en place restock for Saturday service."],["Confirm Monday reorder list with Sylvi based on what was consumed today."]]}]},
    {date:"Saturday 11 Apr",sub:`12:00–22:00 · Public service day 1 · ~${d11.covers} covers`,bg:"#E8D5F5",tasks:[{s:"Pre-service 10:30–11:30",items:[["Top up all mise en place from batch stocks."],["Fryer on by 11:30. Calamares and croquettes ready from frozen."],["Taco fillings in bain marie on low. Warm consommé for birria."],["Infused garlic oil in pan ready for gambas."]]},{s:"During service",items:[["Fire gambas to order from infused oil (4 min)."],["Calamares + croquettes: airfryer 200°C 8-10 min / fryer 180°C 4 min from frozen."],["Batatas: fry pre-cooked potato, sauce from squeeze bottle."],["Track which dishes sell fastest → adjust Sunday prep."]]},{s:"End of service",items:[["Full stock count: proteins, tortillas, produce, salsas."],["Write Monday reorder list → send to Sylvi."]]}]},
    {date:"Sunday 12 Apr",sub:`12:00–22:00 · Public service day 2 · ~${d12.covers} covers`,bg:"#E8D5F5",tasks:[{s:"Pre-service 10:00–11:30",items:[["Morning top-up based on Saturday consumption."],["Make fresh pico de gallo and guacamole if yesterday's batch is low."],["86 any dish running low before service gets heavy — better to pull it than run out mid-service."]]},{s:"During service",items:[["Apply lessons from Saturday on timing and flow."],["Prioritise fastest dishes if covers are high: padrón, chorizo, croquettes."]]},{s:"End of service — opening weekend complete",items:[["Full stock count: every category."],["Finalize Monday reorder list → update Weekly covers tab for Week 2."],["Notes for Sylvi: what worked, what to adjust, what to 86 or add next week."]]}]},
  ];
  let h=`<div class="ib">Quantities include a 10% buffer and update when you change covers in the Events tab. Checkboxes help you track tasks on the day.</div>`;
  days.forEach(day=>{h+=`<div class="pd"><div class="ph" style="background:${day.bg}"><span class="pt">${day.date}</span><span class="ps">${day.sub}</span></div><div class="pb">`;day.tasks.forEach(t=>{h+=`<div class="ts">${t.s}</div>`;t.items.forEach(item=>h+=mT(item[0],item[1]));});h+=`</div></div>`;});
  el.innerHTML=h;
}

function rShopping(sl){const el=document.getElementById("pd-shopping");if(!sl)sl=cSL(shopMode);const gr={};sl.forEach(i=>{if(!gr[i.cat])gr[i.cat]=[];gr[i.cat].push(i);});let h=`<div class="tb"><div><p style="font-size:13px;color:var(--text2)">${sl.length} ingredients · hover a row to see which dishes use it</p><div style="display:flex;gap:6px;margin-top:6px"><button class="btn sm ${shopMode==='events'?'active':''}" onclick="sSM('events')">Opening events</button><button class="btn sm ${shopMode==='week'?'active':''}" onclick="sSM('week')">Weekly</button></div></div><button class="btn p" onclick="cpSL()">Copy list</button></div>`;Object.entries(gr).forEach(([cat,items])=>{h+=`<div class="sl-cat"><span class="sl-cat-label">${cat}</span><div class="sl-rows">`;items.forEach(item=>{h+=`<div class="sl-row"><span class="sl-name">${item.name}</span><span class="sl-qty">${rQ(item.total,item.unit)}</span><div class="sl-sup">${tH(item.sup)}</div>${item.usedIn.length?`<div class="sl-tt">Used in:<br>${item.usedIn.join("<br>")}</div>`:''}</div>`;});h+=`</div></div>`;});if(!sl.length)h+=`<div style="padding:3rem;text-align:center;color:var(--text3);font-size:13px">No active dishes with portions > 0.</div>`;el.innerHTML=h;}

function tExp(id){expId=(expId===id?null:id);editId=null;rDishes();}
function tAct(id){dishes=dishes.map(d=>d.id===id?{...d,active:!d.active}:d);save();render();}
function sEdit(id){editId=id;expId=null;rDishes();}
function dEdit(){editId=null;save();render();}
function uDF(id,f,v){dishes=dishes.map(d=>d.id===id?{...d,[f]:v}:d);}
function uIng(dId,iId,f,v){dishes=dishes.map(d=>d.id===dId?{...d,ings:d.ings.map(i=>i.id===iId?{...i,[f]:v}:i)}:d);}
function dIng(dId,iId){dishes=dishes.map(d=>d.id===dId?{...d,ings:d.ings.filter(i=>i.id!==iId)}:d);const r=document.getElementById("ir-"+iId);if(r)r.remove();}
function aIng(dId){const ni=ig("",0,"g","Produce","");dishes=dishes.map(d=>d.id===dId?{...d,ings:[...d.ings,ni]}:d);const tb=document.getElementById("itb-"+dId);if(tb){const d=dishes.find(x=>x.id===dId);tb.innerHTML=bIR(d);}}
function dDish(id){if(!confirm("Delete this dish?"))return;dishes=dishes.filter(d=>d.id!==id);if(expId===id)expId=null;save();render();}
function uEv(id,f,v){events=events.map(e=>e.id===id?{...e,[f]:parseFloat(v)||0}:e);save();render();}
function uWk(d,f,v){week={...week,[d]:{...week[d],[f]:parseFloat(v)||0}};save();if(tab==="week")rWeek();if(tab==="shopping")rShopping(cSL(shopMode));}
function sSM(m){shopMode=m;rShopping(cSL(m));}
function newDish(){const name=prompt("New dish name:");if(!name||!name.trim())return;const si=parseInt(prompt("Section:\n"+SECS.map((s,i)=>`${i+1}. ${s}`).join("\n")))||2;const sec=SECS[Math.max(0,Math.min(si-1,SECS.length-1))];const price=parseFloat(prompt("Price (£):")||"0")||0;const nd={id:uid(),name:name.trim(),sec,active:true,price,url:"",notes:"",ings:[]};dishes=[...dishes,nd];editId=nd.id;expId=null;save();render();}
function cpSL(){const sl=cSL(shopMode),gr={};sl.forEach(i=>{if(!gr[i.cat])gr[i.cat]=[];gr[i.cat].push(i);});const lines=["MAÑANA RESTAURANT — SHOPPING LIST","Mode: "+(shopMode==="week"?"Weekly (Tue–Sun)":"Opening events 10–12 Apr"),"=".repeat(44),""];Object.entries(gr).forEach(([cat,items])=>{lines.push(cat.toUpperCase());items.forEach(i=>lines.push("  "+i.name+": "+rQ(i.total,i.unit)+(i.sup?" ("+i.sup+")":"")));lines.push("");});navigator.clipboard.writeText(lines.join("\n")).then(()=>{const b=document.querySelector("#pd-shopping .btn.p");if(b){b.textContent="Copied!";setTimeout(()=>b.textContent="Copy list",2000);}}).catch(()=>alert(lines.join("\n")));}

load();
</script>
